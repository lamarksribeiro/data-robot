<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradiente Metálico Cromado para o Ícone -->
    <linearGradient id="metalGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Gradiente Escuro para Juntas e Detalhes -->
    <linearGradient id="darkGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Gradiente Creme do Focinho -->
    <linearGradient id="cremeGradIcon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Gradiente Verde Padrão do Visor -->
    <linearGradient id="visorGradIcon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <!-- Grupo do Ícone do Macaco Ampliado (Favicon-robot) -->
  <g id="favicon-robot">
    <!-- Orelhas Redondas Mecânicas Grandes -->
    <!-- Orelha Esquerda (Preenche até a borda esquerda x=0) -->
    <circle cx="17" cy="48" r="16" fill="url(#metalGradIcon)" stroke="#1e293b" stroke-width="1.5" />
    <circle cx="17" cy="48" r="11" fill="url(#darkGradIcon)" />
    <circle cx="17" cy="48" r="5" fill="url(#visorGradIcon)" />

    <!-- Orelha Direita (Preenche até a borda direita x=100) -->
    <circle cx="83" cy="48" r="16" fill="url(#metalGradIcon)" stroke="#1e293b" stroke-width="1.5" />
    <circle cx="83" cy="48" r="11" fill="url(#darkGradIcon)" />
    <circle cx="83" cy="48" r="5" fill="url(#visorGradIcon)" />

    <!-- Cabeça Principal (Muito maior, ocupando o centro) -->
    <ellipse cx="50" cy="51" rx="36" ry="31" fill="url(#metalGradIcon)" stroke="#1e293b" stroke-width="1.8" />

    <!-- Focinho Ampliado (Muzzle) -->
    <path d="M 26,58 Q 50,45 74,58 Q 80,74 50,78 Q 20,74 26,58 Z" fill="url(#cremeGradIcon)" stroke="#cbd5e1" stroke-width="1" />
    <ellipse cx="50" cy="61" rx="4.5" ry="2.8" fill="#1e293b" />
    <path d="M 42,67 Q 50,71 58,67" fill="none" stroke="#1e293b" stroke-width="1.2" stroke-linecap="round" />

    <!-- Visor Ocular Digital Grande -->
    <path d="M 23,38 L 77,38 Q 82,53 75,56 L 25,56 Q 18,53 23,38 Z" fill="url(#visorGradIcon)" stroke="#047857" stroke-width="1.2" />

    <!-- Olhos Globos Oculares -->
    <ellipse cx="37" cy="47" rx="5.8" ry="7.5" fill="#ffffff" />
    <ellipse cx="63" cy="47" rx="5.8" ry="7.5" fill="#ffffff" />

    <!-- Pupilas -->
    <circle cx="37" cy="47" r="2.8" fill="#000000" />
    <circle cx="35.8" cy="45.8" r="0.6" fill="#ffffff" />
    <circle cx="63" cy="47" r="2.8" fill="#000000" />
    <circle cx="61.8" cy="45.8" r="0.6" fill="#ffffff" />
  </g>
</svg>
